<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Gallery</title>
<link rel="stylesheet" href="gallery.css">
</head>

<body>

<button class="back" onclick="goBack()">←</button>

<h3 class="gallery-title">Portrait Gallery</h3>

<div class="gallery">

<img src="images/photo4.jpeg" onclick="openImage(this)">
<img src="images/bir1.jpg" onclick="openImage(this)">
<img src="images/bir2.jpg" onclick="openImage(this)">
<img src="images/bir3.jpg" onclick="openImage(this)">
<img src="images/bir4.jpg" onclick="openImage(this)">

</div>

<div id="preview">

<button class="nav prev" onclick="prevImage()">❮</button>

<img id="previewImg">

<button class="nav next" onclick="nextImage()">❯</button>

<span class="close" onclick="closeImage()">✕</span>

</div>

<script src="script.js"></script>

</body>
</html>
