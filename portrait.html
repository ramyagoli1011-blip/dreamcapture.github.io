<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Gallery</title>
<link rel="stylesheet" href="gallery.css">
</head>

<body>

<button class="back" onclick="goBack()">←</button>

<h2 class="gallery-title">Portrait Gallery</h2>

<div class="gallery">

<img src="photo4.jpeg" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1513151233558-d860c5398176" onclick="openImage(this)">
<img src="https://images.unsplash.com/photo-1504805572947-34fad45aed93" onclick="openImage(this)">

</div>

<div id="preview">

<button class="nav prev" onclick="prevImage()">❮</button>

<img id="previewImg">

<button class="nav next" onclick="nextImage()">❯</button>

<span class="close" onclick="closeImage()">✕</span>

</div>

<script src="script.js"></script>

</body>
</html>
